name: Build Windows Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -e
          GODOT_VERSION="4.7-stable"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_VERSION}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/4.7.stable"
          unzip -q "Godot_v${GODOT_VERSION}_export_templates.tpz"
          mv templates/* "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Export Windows build
        run: |
          mkdir -p build
          godot --headless --path . --export-release "Windows Desktop" "build/MazeWars.exe"

      - name: Write build metadata
        run: |
          VERSION=$(python -c "import json; print(json.load(open('version.json'))['version'])")
          echo "${VERSION}+${GITHUB_SHA::7}" > build/version.txt
          echo "Built from ${GITHUB_SHA}" > build/build-info.txt
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        id: version_meta

      - name: Write file manifest
        run: |
          python3 << 'EOF'
          import hashlib, json, os
          root = "build"
          manifest = {}
          for dirpath, _, filenames in os.walk(root):
              for name in filenames:
                  if name == "manifest.json":
                      continue
                  full = os.path.join(dirpath, name)
                  rel = os.path.relpath(full, root).replace("\\", "/")
                  with open(full, "rb") as handle:
                      digest = hashlib.sha256(handle.read()).hexdigest()
                  manifest[rel] = digest
          with open(os.path.join(root, "manifest.json"), "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, indent=2, sort_keys=True)
          EOF

      - name: Package zip
        run: |
          mkdir -p build/launcher
          cp tools/launcher/Play-MazeWars.ps1 tools/launcher/Play-MazeWars.bat tools/launcher/config.json build/launcher/
          cd build
          zip -r ../MazeWars-win64.zip .

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          allowUpdates: true
          makeLatest: true
          name: Latest Build
          prerelease: false
          body: |
            Version: ${{ steps.version_meta.outputs.version }}
            Auto-built from `${{ github.sha }}` on `${{ github.ref_name }}`.
            Launcher: `MazeWars-win64.zip` · itch.io channel: `windows`
          artifacts: MazeWars-win64.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: |
          if [ -z "$BUTLER_API_KEY" ]; then
            echo "ITCH_API_KEY secret not set — skipping itch.io upload."
            exit 0
          fi
          TARGET=$(tr -d '[:space:]' < tools/itch/target.txt)
          if echo "$TARGET" | grep -qi "YOUR_"; then
            echo "Set tools/itch/target.txt before pushing to itch.io."
            exit 0
          fi
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          ./butler -V
          ./butler push build "$TARGET" --userversion-file build/version.txt
